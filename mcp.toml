[mcp_servers.github]
enabled = true
type = "http"
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env = "GITHUB_PERSONAL_ACCESS_TOKEN"
timeout_ms = 30000

[mcp_servers.bitbucket]
enabled = true
type = "stdio"
command = "npx"
args = ["-y", "@nexus2520/bitbucket-mcp-server"]
env_from = [
  "BITBUCKET_USERNAME",
  "BITBUCKET_APP_PASSWORD",
  "BITBUCKET_TOKEN",
  "BITBUCKET_BASE_URL",
  "BITBUCKET_TOOL_GROUPS",
]
timeout_ms = 30000
